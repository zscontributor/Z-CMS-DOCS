server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Starlight builds directory-style pages (/vi/guide/ -> /vi/guide/index.html),
    # so a directory URL resolves to its index; a miss falls through to 404.
    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;

    # Fingerprinted assets are immutable — cache them for a year. HTML is served
    # fresh so a new deploy is visible immediately.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The Pagefind search index is also content-hashed.
    location /pagefind/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # gzip the text payloads (nginx serves the static files as-is otherwise).
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
